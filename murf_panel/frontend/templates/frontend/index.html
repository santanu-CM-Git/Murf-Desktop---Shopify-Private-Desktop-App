<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Murf Electric Bikes</title>
    {% load static %}
    {% csrf_token %}
    
    <link rel="icon" type="image/x-icon" href="{% static "favicon.ico" %}">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="{% static "css/index.css" %}" />
    <link href="{% static "css/style.css" %}" rel="stylesheet">
    <style>
      #main {
        margin: 0;
        background-color: #1e1e1e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: white;
        font-family: 'Poppins', sans-serif;
        overflow: hidden;
        transition: opacity 0.3s ease-out; /* Smooth fade-out */
      }
      #main.hidden {
        opacity: 0;
        pointer-events: none; /* Prevent interaction during fade */
      }
      .loader {
        width: 150px;
        height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        filter: drop-shadow(0 0 8px rgba(0, 204, 255, 0.5));
      }
      .loader svg {
        width: 100%;
        height: 100%;
        transform-origin: center;
        animation: rotate 4s linear infinite;
        will-change: transform; /* Optimize animation */
      }
      .node {
        animation: pulse 1.2s ease-in-out infinite;
      }
      .node:nth-child(2) { animation-delay: -0.2s; }
      .node:nth-child(3) { animation-delay: -0.4s; }
      .node:nth-child(4) { animation-delay: -0.6s; }
      .node:nth-child(5) { animation-delay: -0.8s; }
      .node:nth-child(6) { animation-delay: -1s; }
      .core {
        animation: corePulse 2s ease-in-out infinite;
      }
      #message {
        margin-top: 20px;
        font-size: 16px;
        color: #66e6ff;
        text-align: center;
        text-shadow: 0 0 5px rgba(0, 204, 255, 0.5);
        letter-spacing: 1px;
        opacity: 0.9;
      }
      @keyframes rotate {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.7; }
        50% { transform: scale(1.5); opacity: 1; }
      }
      @keyframes corePulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.3); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="main">
      <div class="loader">
        <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <!-- Central Glowing Core -->
          <circle class="core" cx="80" cy="80" r="12" fill="#00ccff" />
          <!-- Hexagonal Orbit Nodes -->
          <circle class="node" cx="80" cy="40" r="6" fill="#66e6ff" /> <!-- Top -->
          <circle class="node" cx="115.5" cy="60" r="6" fill="#66e6ff" /> <!-- Top-right -->
          <circle class="node" cx="115.5" cy="100" r="6" fill="#66e6ff" /> <!-- Bottom-right -->
          <circle class="node" cx="80" cy="120" r="6" fill="#66e6ff" /> <!-- Bottom -->
          <circle class="node" cx="44.5" cy="100" r="6" fill="#66e6ff" /> <!-- Bottom-left -->
          <circle class="node" cx="44.5" cy="60" r="6" fill="#66e6ff" /> <!-- Top-left -->
          <!-- Connecting Lines for Hexagon -->
          <path
            d="M80 40 L115.5 60 L115.5 100 L80 120 L44.5 100 L44.5 60 Z"
            fill="none"
            stroke="#33aacc"
            stroke-width="1"
            stroke-opacity="0.5"
            stroke-dasharray="5,5"
          >
            <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite" />
          </path>
        </svg>
      </div>
      <div id="message">Starting the app...</div>
    </div>
    <script src="{% static "frontend/main.js" %}"></script>
    <script>
      // Allow updates from Electron
      window.updateMessage = function (text) {
        if (text === "-") {
          const main = document.getElementById("main");
          main.classList.add("hidden"); // Trigger fade-out
          setTimeout(() => main.remove(), 300); // Remove after fade
        } else {
          document.getElementById("message").innerText = text;
        }
      };
    </script>
  </body>
</html>
