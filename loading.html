<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        background-color: #1e1e1e;
        display: flex;
        flex-direction: column; /* Stack loader and message vertically */
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: white;
        font-family: 'Arial', sans-serif;
        overflow: hidden;
      }
      .loader {
        width: 150px; /* Generous size to prevent cropping */
        height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        filter: drop-shadow(0 0 10px rgba(0, 204, 255, 0.6)); /* Glow effect */
      }
      .loader svg {
        width: 100%;
        height: 100%;
        transform-origin: center;
        animation: rotate 4s linear infinite; /* Slow, smooth rotation */
      }
      .node {
        animation: pulse 1.2s ease-in-out infinite;
      }
      .node:nth-child(2) { animation-delay: -0.2s; }
      .node:nth-child(3) { animation-delay: -0.4s; }
      .node:nth-child(4) { animation-delay: -0.6s; }
      .node:nth-child(5) { animation-delay: -0.8s; }
      .node:nth-child(6) { animation-delay: -1s; }
      .core {
        animation: corePulse 2s ease-in-out infinite;
      }
      #message {
        margin-top: 20px; /* Space between loader and message */
        font-size: 16px;
        color: #66e6ff; /* Match loader's node color for cohesion */
        text-align: center;
        text-shadow: 0 0 5px rgba(0, 204, 255, 0.5); /* Subtle glow */
        letter-spacing: 1px;
        opacity: 0.9;
      }
      @keyframes rotate {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.7; }
        50% { transform: scale(1.5); opacity: 1; }
      }
      @keyframes corePulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.3); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <!-- Central Glowing Core -->
        <circle class="core" cx="80" cy="80" r="12" fill="#00ccff" />
        <!-- Hexagonal Orbit Nodes -->
        <circle class="node" cx="80" cy="40" r="6" fill="#66e6ff" /> <!-- Top -->
        <circle class="node" cx="115.5" cy="60" r="6" fill="#66e6ff" /> <!-- Top-right -->
        <circle class="node" cx="115.5" cy="100" r="6" fill="#66e6ff" /> <!-- Bottom-right -->
        <circle class="node" cx="80" cy="120" r="6" fill="#66e6ff" /> <!-- Bottom -->
        <circle class="node" cx="44.5" cy="100" r="6" fill="#66e6ff" /> <!-- Bottom-left -->
        <circle class="node" cx="44.5" cy="60" r="6" fill="#66e6ff" /> <!-- Top-left -->
        <!-- Connecting Lines for Hexagon -->
        <path
          d="M80 40 L115.5 60 L115.5 100 L80 120 L44.5 100 L44.5 60 Z"
          fill="none"
          stroke="#33aacc"
          stroke-width="1"
          stroke-opacity="0.5"
          stroke-dasharray="5,5"
        >
          <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite" />
        </path>
      </svg>
    </div>
    <div id="message">Starting the app...</div>
  </body>
  <script>
    // Allow updates from Electron
    window.updateMessage = function (text) {
      document.getElementById('message').innerText = text;
    };
  </script>
</html>
